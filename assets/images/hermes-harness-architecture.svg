<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="980" viewBox="0 0 1600 980" role="img" aria-labelledby="title desc">
  <title id="title">Hermes Agent Harness 架构图</title>
  <desc id="desc">展示 Model、Harness、Hermes Agent、工具、记忆、技能、多 Agent 与平台入口之间的关系。</desc>
  <defs>
    <pattern id="grid" width="32" height="32" patternUnits="userSpaceOnUse">
      <path d="M32 0H0V32" fill="none" stroke="#e8dcc8" stroke-width="1"/>
    </pattern>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="8" stdDeviation="8" flood-color="#65513d" flood-opacity="0.16"/>
    </filter>
    <style>
      text{font-family:"PingFang SC","Hiragino Sans GB","Noto Sans CJK SC","Microsoft YaHei",sans-serif}
      .bg{fill:#fbf3df}
      .panel{fill:#fffaf0;stroke:#bba582;stroke-width:3}
      .box{fill:#fffdf7;stroke:#bba582;stroke-width:3}
      .model{fill:#d9e8f5;stroke:#8fb3ca;stroke-width:3}
      .harness{fill:#dfe9c8;stroke:#93aa73;stroke-width:3}
      .skill{fill:#ead9f4;stroke:#b9a0c9;stroke-width:3}
      .tool{fill:#f7e09b;stroke:#c7a55a;stroke-width:3}
      .warn{fill:#f5d7d2;stroke:#c89b95;stroke-width:3}
      .ink{fill:#352c22}
      .muted{fill:#75685a}
      .h1{font-size:50px;font-weight:850}
      .h2{font-size:30px;font-weight:850}
      .body{font-size:22px;font-weight:650}
      .small{font-size:18px;font-weight:650}
      .line{stroke:#6a543e;stroke-width:5;stroke-linecap:round;stroke-linejoin:round;fill:none}
    </style>
  </defs>
  <rect class="bg" width="1600" height="980"/>
  <rect width="1600" height="980" fill="url(#grid)" opacity=".72"/>
  <rect x="54" y="50" width="1492" height="880" rx="34" class="panel" filter="url(#shadow)"/>

  <text x="100" y="125" class="h1 ink">Hermes Agent = Model + 内置 Harness 运行时</text>
  <text x="102" y="170" class="body muted">Harness 不是某个单独项目，而是包在模型外面的控制系统：记忆、工具、规划、约束、验证、反馈闭环。</text>

  <g transform="translate(115 280)">
    <rect width="300" height="180" rx="20" class="model"/>
    <text x="38" y="62" class="h2 ink">Model 大脑</text>
    <text x="38" y="108" class="body muted">GPT / Claude / Hermes LLM</text>
    <text x="38" y="142" class="body muted">负责生成与推理</text>
  </g>

  <g transform="translate(520 230)">
    <rect width="560" height="360" rx="26" class="harness"/>
    <text x="40" y="62" class="h2 ink">Harness 控制系统</text>
    <text x="40" y="108" class="body muted">上下文管理 / 任务编排 / 工具调度</text>
    <text x="40" y="144" class="body muted">权限约束 / 沙箱执行 / 结果验证</text>
    <text x="40" y="180" class="body muted">会话持久化 / 崩溃恢复 / 反馈闭环</text>
    <g transform="translate(42 220)">
      <rect width="145" height="78" rx="14" class="box"/>
      <text x="28" y="47" class="small ink">Memory</text>
      <rect x="180" width="145" height="78" rx="14" class="box"/>
      <text x="222" y="47" class="small ink">Skills</text>
      <rect x="360" width="145" height="78" rx="14" class="box"/>
      <text x="402" y="47" class="small ink">Tools</text>
    </g>
  </g>

  <g transform="translate(1185 280)">
    <rect width="280" height="180" rx="20" class="warn"/>
    <text x="36" y="62" class="h2 ink">Hermes Agent</text>
    <text x="36" y="108" class="body muted">已经造好的整车</text>
    <text x="36" y="142" class="body muted">开箱即用的框架</text>
  </g>

  <path class="line" d="M415 370H520"/>
  <path class="line" d="M1080 370H1185"/>
  <path d="M515 370l-18-13v26zM1180 370l-18-13v26z" fill="#6a543e"/>

  <g transform="translate(150 655)">
    <rect width="250" height="135" rx="18" class="tool"/>
    <text x="32" y="54" class="h2 ink">工具链</text>
    <text x="32" y="92" class="body muted">终端 / 文件 / Web</text>
  </g>
  <g transform="translate(455 655)">
    <rect width="250" height="135" rx="18" class="skill"/>
    <text x="32" y="54" class="h2 ink">Skill</text>
    <text x="32" y="92" class="body muted">可沉淀流程卡</text>
  </g>
  <g transform="translate(760 655)">
    <rect width="250" height="135" rx="18" class="model"/>
    <text x="32" y="54" class="h2 ink">多 Agent</text>
    <text x="32" y="92" class="body muted">分工与委派</text>
  </g>
  <g transform="translate(1065 655)">
    <rect width="300" height="135" rx="18" class="harness"/>
    <text x="32" y="54" class="h2 ink">多入口</text>
    <text x="32" y="92" class="body muted">CLI / Dashboard / Gateway</text>
  </g>

  <path class="line" d="M275 655C360 585 520 560 620 590"/>
  <path class="line" d="M580 655C635 607 702 590 800 590"/>
  <path class="line" d="M885 655C890 620 890 610 875 590"/>
  <path class="line" d="M1215 655C1145 605 1078 585 1040 555"/>

  <g transform="translate(180 835)">
    <rect width="1240" height="58" rx="16" fill="#fff7e8" stroke="#bba582" stroke-width="3"/>
    <text x="32" y="38" class="body ink">一句话：Hermes Agent 不是“模型 + 外部 Harness 项目”，而是把 Harness Engineering 做进框架里的完整 Agent 系统。</text>
  </g>
</svg>
